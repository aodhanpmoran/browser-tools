<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Browser Tools</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Browser Tools</h1>
        <button id="open-options" type="button" class="link-button">Options</button>
      </header>
      <section class="section">
        <h2 class="section-title">Features</h2>
        <ul id="feature-list" class="feature-list"></ul>
      </section>
      <section class="section" id="cookies-section">
        <h2 class="section-title">Cookies for this site</h2>
        <div id="cookies-summary" class="cookies-summary"></div>
      </section>
      <section class="section" id="recently-closed-section">
        <h2 class="section-title">Recently closed</h2>
        <ul id="recently-closed" class="recent-list"></ul>
      </section>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
